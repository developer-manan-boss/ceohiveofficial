    <path
      d="M 150 14 A 26 26 0 0 1 176 40 L 162 40 A 12 12 0 0 0 150 28 Z"
      fill="#dfb455"
      stroke="#0b0f19"
      stroke-width="1"
    />
    <path
      d="M 174 44 A 26 26 0 0 1 140 66 L 140 52 A 12 12 0 0 0 160 44 Z"
