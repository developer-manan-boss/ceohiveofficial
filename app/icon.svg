      stroke-width="1"
    />
    <path
      d="M 136 64 A 26 26 0 0 1 124 40 L 138 40 A 12 12 0 0 0 144 54 Z"
      fill="url(#gold-hatch)"
      stroke="#dfb455"
      stroke-width="1"
    />
    <path
      d="M 136 64 A 26 26 0 0 1 124 40 L 138 40 A 12 12 0 0 0 144 54 Z"
      fill="none"
      stroke="#0b0f19"
      stroke-width="1"
    />
    <path
      d="M 126 36 A 26 26 0 0 1 146 14 L 148 28 A 12 12 0 0 0 138 36 Z"
      fill="#eedaa2"
